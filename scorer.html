<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuscript Scorer</title>
  <link rel="stylesheet" href="styles.css">
  <!-- File System API -->
  <script src="file-system.js"></script>
  <!-- Ace Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-searchbox.js"></script>
  <!-- Custom Cuneiform Mode -->
  <script src="cuneiform-score-mode.js"></script>
  <!-- PDF.js for PDF page extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- Fabric.js for image annotation -->
  <script src="fabric.min.js"></script>
  <!-- Y.js for real-time collaboration (optional) -->
  <script>
    // Mark collaboration as disabled - Y.js CDN loading is problematic
    // To enable, run: npm install yjs y-websocket and use a bundler
    window.COLLAB_ENABLED = false;
  </script>
</head>

<body>
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-link">&larr;</a>
      <h1 id="project-title">Manuscript Scorer</h1>
    </div>
    <div class="header-actions">
      <div id="status" class="gdrive-status">
        <span id="status-indicator" class="gdrive-indicator connected"></span>
        <span id="status-text">Ready</span>
      </div>
      <button id="save-btn" title="Save (Ctrl+S)">Save</button>
      <button id="search-all-btn" title="Search all manuscripts (Ctrl+Shift+F)">Search All</button>
      <button id="add-manuscript-btn">+ Add</button>
      <button id="theme-toggle-btn" title="Toggle Dark/Light Mode"
        style="display: flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button id="annotations-btn" title="Bugs &amp; Enhancements">Notes</button>
      <button id="export-btn">Export</button>
    </div>
  </header>

  <main class="content">
    <aside class="manuscript-list" id="manuscript-sidebar">
      <div class="sidebar-header">
        <h2>Manuscripts</h2>
        <button id="toggle-siglum-btn" class="toggle-siglum-btn"
          title="Toggle between museum number and siglum">M#</button>
      </div>
      <ul id="manuscript-list">
        <!-- Loaded from manuscripts/*.txt -->
      </ul>
    </aside>

    <section class="work-area">
      <div class="editor-pane">
        <div class="pane-header">
          <h2>Manuscript Text</h2>
          <span class="help-hint">Ctrl+F search | §[score-line] [ms-line]. to map</span>
        </div>
        <div id="editor" class="editor"></div>
      </div>

      <div class="resizer" id="pane-resizer"></div>

      <div class="score-pane">
        <div class="pane-header pane-header-tabs">
          <div class="pane-tabs">
            <button class="pane-tab active" data-tab="score">Score</button>
            <button class="pane-tab" data-tab="colophons">Colophons</button>
            <button class="pane-tab" data-tab="images">Images</button>
          </div>
          <button id="upload-file-btn" class="tab-header-btn hidden" title="Upload image or PDF">+ Upload</button>
        </div>
        <div id="score" class="score tab-content active" data-tab="score"></div>
        <div id="colophons" class="score tab-content" data-tab="colophons"></div>
        <div id="images-tab" class="tab-content" data-tab="images">
          <div id="images-grid" class="images-grid">
            <div class="images-empty">No images for this manuscript.</div>
          </div>
          <div id="image-viewer" class="image-viewer hidden">
            <div class="viewer-toolbar">
              <div class="viewer-toolbar-group">
                <button id="viewer-select-btn" class="viewer-tool-btn active" title="Select / Pan">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
                </button>
                <button id="viewer-draw-btn" class="viewer-tool-btn" title="Freehand draw">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                </button>
                <button id="viewer-line-btn" class="viewer-tool-btn" title="Line tool (click to place points, double-click to finish)">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="5" r="2"/></svg>
                </button>
                <button id="viewer-erase-btn" class="viewer-tool-btn" title="Delete selected annotation">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
                </button>
                <button id="viewer-undo-btn" class="viewer-tool-btn" title="Undo last annotation">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
                </button>
              </div>
              <div class="viewer-toolbar-group viewer-draw-options" id="draw-options">
                <input type="color" id="draw-color" value="#ff0000" title="Line color">
                <label class="draw-thickness-label" title="Line thickness">
                  <input type="range" id="draw-thickness" min="1" max="20" value="10">
                  <span id="draw-thickness-val">10</span>px
                </label>
                <label class="draw-opacity-label" title="Opacity">
                  <input type="range" id="draw-opacity" min="10" max="100" value="60" step="5">
                  <span id="draw-opacity-val">60</span>%
                </label>
              </div>
              <div class="viewer-toolbar-group">
                <button id="viewer-zoom-in" class="viewer-tool-btn" title="Zoom in">+</button>
                <span id="viewer-zoom-level" class="viewer-zoom-level">100%</span>
                <button id="viewer-zoom-out" class="viewer-tool-btn" title="Zoom out">&minus;</button>
                <button id="viewer-zoom-fit" class="viewer-tool-btn" title="Fit to view">Fit</button>
              </div>
              <div class="viewer-toolbar-group viewer-nav-group">
                <button class="viewer-tool-btn" id="viewer-prev" title="Previous image">&lsaquo;</button>
                <span id="viewer-counter" class="viewer-counter"></span>
                <button class="viewer-tool-btn" id="viewer-next" title="Next image">&rsaquo;</button>
              </div>
              <div class="viewer-toolbar-group">
                <button id="viewer-check-btn" class="viewer-tool-btn viewer-check-btn" title="Mark as transliterated">&#x2713;</button>
              </div>
            </div>
            <div class="viewer-canvas-wrapper" id="viewer-canvas-wrapper">
              <canvas id="viewer-canvas"></canvas>
            </div>
            <div class="viewer-footer">
              <span id="viewer-caption"></span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Search All Manuscripts Modal -->
  <div id="search-modal" class="modal hidden">
    <div class="modal-content search-modal">
      <div class="modal-header">
        <h3>Search All Manuscripts</h3>
        <button class="modal-close" id="close-search">&times;</button>
      </div>
      <div class="search-input-row">
        <input type="text" id="search-input" placeholder="Search pattern..." autofocus>
        <label class="regex-toggle">
          <input type="checkbox" id="search-regex"> Regex
        </label>
        <label class="regex-toggle">
          <input type="checkbox" id="search-case"> Case sensitive
        </label>
      </div>
      <div class="replace-row">
        <input type="text" id="replace-input" placeholder="Replace with...">
        <button id="replace-btn" class="replace-btn" disabled>Replace</button>
        <button id="replace-all-btn" class="replace-btn" disabled>Replace All</button>
        <button id="undo-replace-btn" class="replace-btn undo-btn" disabled>Undo</button>
      </div>
      <div id="search-results" class="search-results">
        <div class="search-empty">Enter a search term above</div>
      </div>
    </div>
  </div>

  <!-- Add Manuscript Dialog -->
  <dialog id="add-manuscript-dialog" class="dialog add-manuscript-dialog">
    <h2>Add Manuscript</h2>
    <div class="add-manuscript-options">
      <button id="add-new-manuscript-btn" class="add-option-btn">
        <span class="option-icon">+</span>
        <span class="option-text">
          <strong>Create New</strong>
          <small>Start with an empty manuscript</small>
        </span>
      </button>
      <button id="import-manuscripts-btn" class="add-option-btn">
        <span class="option-icon">&#8593;</span>
        <span class="option-text">
          <strong>Import Files</strong>
          <small>Import .txt files from your computer</small>
        </span>
      </button>
    </div>
    <div class="dialog-actions">
      <button type="button" id="cancel-add-manuscript-btn">Cancel</button>
    </div>
  </dialog>

  <!-- Annotations Panel -->
  <div id="annotations-panel" class="annotations-panel hidden">
    <div class="annotations-header">
      <h3>Annotations</h3>
      <div class="annotations-header-actions">
        <select id="annotations-filter">
          <option value="all">All</option>
          <option value="open">Open</option>
          <option value="resolved">Resolved</option>
          <option value="bug">Bugs</option>
          <option value="enhancement">Enhancements</option>
        </select>
        <button id="add-annotation-btn" class="btn-primary" title="Add annotation">+</button>
        <button id="close-annotations-btn" class="modal-close">&times;</button>
      </div>
    </div>
    <div id="annotation-form" class="annotation-form hidden">
      <div class="form-row">
        <select id="annotation-type">
          <option value="bug">Bug</option>
          <option value="enhancement">Enhancement</option>
        </select>
        <input type="text" id="annotation-title" placeholder="Short title...">
      </div>
      <textarea id="annotation-desc" placeholder="Description (optional)..." rows="2"></textarea>
      <div class="form-row">
        <input type="text" id="annotation-location" placeholder="Location, e.g. ms name : line (optional)">
        <button id="save-annotation-btn" class="btn-primary">Save</button>
        <button id="cancel-annotation-btn">Cancel</button>
      </div>
    </div>
    <div id="annotations-list" class="annotations-list">
      <div class="annotations-empty">No annotations yet.</div>
    </div>
  </div>

  <!-- PDF Page Picker Modal -->
  <div id="pdf-picker-modal" class="modal hidden">
    <div class="modal-content pdf-picker-modal">
      <div class="modal-header">
        <h3>Select a Page from PDF</h3>
        <button class="modal-close" id="close-pdf-picker">&times;</button>
      </div>
      <div class="pdf-picker-controls">
        <button id="pdf-prev-page" disabled>&larr; Prev</button>
        <span class="pdf-page-nav">Page <input type="number" id="pdf-page-input" value="1" min="1"> / <span id="pdf-page-total">1</span></span>
        <button id="pdf-next-page" disabled>Next &rarr;</button>
      </div>
      <div class="pdf-picker-canvas-wrapper">
        <canvas id="pdf-picker-canvas"></canvas>
      </div>
      <div class="pdf-picker-actions">
        <button id="pdf-save-page" class="btn-primary">Save This Page as Image</button>
        <button id="pdf-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
